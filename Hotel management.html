<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-tabs .nav-link { font-weight: bold; color: #495057; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 3px solid #0d6efd; }
    </style>
</head>
<body>


<nav class="navbar navbar-dark bg-primary mb-4 shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h2">🏥 CityCare Hospital Management</span>
    </div>
</nav>

<div class="container">
    
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button" role="tab">📊 Dashboard</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="patients-tab" data-bs-toggle="tab" data-bs-target="#patients" type="button" role="tab">🤒 Patients</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="doctors-tab" data-bs-toggle="tab" data-bs-target="#doctors" type="button" role="tab">👨‍⚕️ Doctors</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="appointments-tab" data-bs-toggle="tab" data-bs-target="#appointments" type="button" role="tab">📅 Appointments</button>
        </li>
    </ul>

    <!-- Tab Contents -->
    <div class="tab-content" id="myTabContent">
        
        <!-- 1. DASHBOARD TAB -->
        <div class="tab-pane fade show active" id="dashboard" role="tabpanel">
            <div class="row text-center mt-4">
                <div class="col-md-4">
                    <div class="card bg-info text-white p-4 mb-3">
                        <h3>Total Patients</h3>
                        <h2 id="dash-patients">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-success text-white p-4 mb-3">
                        <h3>Total Doctors</h3>
                        <h2 id="dash-doctors">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-warning text-dark p-4 mb-3">
                        <h3>Appointments</h3>
                        <h2 id="dash-appointments">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. PATIENTS TAB -->
        <div class="tab-pane fade" id="patients" role="tabpanel">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Register Patient</h5>
                        <form id="patientForm">
                            <input type="text" id="p_name" class="form-control mb-2" placeholder="Patient Name" required>
                            <input type="number" id="p_age" class="form-control mb-2" placeholder="Age" required>
                            <input type="text" id="p_contact" class="form-control mb-2" placeholder="Contact No" required>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3">
                        <h5>Patient List</h5>
                        <table class="table table-striped">
                            <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Contact</th></tr></thead>
                            <tbody id="patientTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. DOCTORS TAB -->
        <div class="tab-pane fade" id="doctors" role="tabpanel">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Add Doctor</h5>
                        <form id="doctorForm">
                            <input type="text" id="d_name" class="form-control mb-2" placeholder="Doctor Name (e.g. Dr. Smith)" required>
                            <select id="d_specialty" class="form-select mb-2" required>
                                <option value="">Select Specialty</option>
                                <option value="Cardiologist">Cardiologist</option>
                                <option value="Neurologist">Neurologist</option>
                                <option value="Orthopedic">Orthopedic</option>
                                <option value="General Physician">General Physician</option>
                            </select>
                            <button type="submit" class="btn btn-success w-100">Add Doctor</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3">
                        <h5>Doctor List</h5>
                        <table class="table table-striped">
                            <thead><tr><th>ID</th><th>Name</th><th>Specialty</th></tr></thead>
                            <tbody id="doctorTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. APPOINTMENTS TAB -->
        <div class="tab-pane fade" id="appointments" role="tabpanel">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Book Appointment</h5>
                        <form id="appointmentForm">
                            <select id="a_patient" class="form-select mb-2" required>
                                <option value="">Select Patient</option>
                            </select>
                            <select id="a_doctor" class="form-select mb-2" required>
                                <option value="">Select Doctor</option>
                            </select>
                            <input type="datetime-local" id="a_date" class="form-control mb-2" required>
                            <button type="submit" class="btn btn-warning w-100">Book Now</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3">
                        <h5>Appointments List</h5>
                        <table class="table table-striped">
                            <thead><tr><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th></tr></thead>
                            <tbody id="appointmentTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script>
    
    let db = JSON.parse(localStorage.getItem('hospitalDB')) || {
        patients: [],
        doctors: [
            { id: 1, name: "Dr. Sharma", specialty: "Cardiologist" },
            { id: 2, name: "Dr. Gupta", specialty: "Neurologist" }
        ],
        appointments: []
    };

    function saveData() {
        localStorage.setItem('hospitalDB', JSON.stringify(db));
        renderAll();
    }

    
    function renderAll() {
        // Update Dashboard Stats
        document.getElementById('dash-patients').innerText = db.patients.length;
        document.getElementById('dash-doctors').innerText = db.doctors.length;
        document.getElementById('dash-appointments').innerText = db.appointments.length;

        
        const ptBody = document.getElementById('patientTable');
        ptBody.innerHTML = '';
        db.patients.forEach(p => {
            ptBody.innerHTML += `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.age}</td><td>${p.contact}</td></tr>`;
        });

        
        const dtBody = document.getElementById('doctorTable');
        dtBody.innerHTML = '';
        db.doctors.forEach(d => {
            dtBody.innerHTML += `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.specialty}</td></tr>`;
        });

        
        const aptBody = document.getElementById('appointmentTable');
        aptBody.innerHTML = '';
        db.appointments.forEach(a => {
            aptBody.innerHTML += `<tr><td>${a.patient}</td><td>${a.doctor}</td><td>${new Date(a.date).toLocaleString()}</td><td><span class="badge bg-success">Confirmed</span></td></tr>`;
        });

        
        const ptSelect = document.getElementById('a_patient');
        const dtSelect = document.getElementById('a_doctor');
        ptSelect.innerHTML = '<option value="">Select Patient</option>';
        dtSelect.innerHTML = '<option value="">Select Doctor</option>';
        
        db.patients.forEach(p => ptSelect.innerHTML += `<option value="${p.name}">${p.name}</option>`);
        db.doctors.forEach(d => dtSelect.innerHTML += `<option value="${d.name}">${d.name} (${d.specialty})</option>`);
    }

    
    document.getElementById('patientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        db.patients.push({
            id: db.patients.length + 1,
            name: document.getElementById('p_name').value,
            age: document.getElementById('p_age').value,
            contact: document.getElementById('p_contact').value
        });
        this.reset();
        saveData();
        alert("Patient Registered!");
    });

    document.getElementById('doctorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        db.doctors.push({
            id: db.doctors.length + 1,
            name: document.getElementById('d_name').value,
            specialty: document.getElementById('d_specialty').value
        });
        this.reset();
        saveData();
        alert("Doctor Added!");
    });

    document.getElementById('appointmentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        db.appointments.push({
            patient: document.getElementById('a_patient').value,
            doctor: document.getElementById('a_doctor').value,
            date: document.getElementById('a_date').value
        });
        this.reset();
        saveData();
        alert("Appointment Booked!");
    });

    
    renderAll();
</script>

</body>
</html>
